<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StayFind — Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Manrope", system-ui, sans-serif; background: #F7F3EF; padding: 32px; color: #1E3A5F; -webkit-font-smoothing: antialiased; }
  .section { margin-bottom: 36px; }
  .section-label { font-size: 11px; font-weight: 700; color: #9FB3C8; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px; }

  /* Hotel result card */
  .hotel-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid rgba(15,37,68,0.06);
    box-shadow: 0 2px 12px rgba(15,37,68,0.08);
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    max-width: 520px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .hotel-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(15,37,68,0.13); }

  .hotel-avatar {
    width: 52px; height: 52px; border-radius: 12px;
    background: linear-gradient(135deg, #1E3A5F 0%, #4A6A8A 100%);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.9);
  }

  .hotel-info { flex: 1; min-width: 0; }
  .hotel-name { font-size: 15px; font-weight: 700; color: #1E3A5F; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hotel-meta { font-size: 12px; color: #9FB3C8; font-weight: 500; margin-bottom: 8px; }
  .hotel-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #F0EBE5; color: #4A6A8A; }
  .tag-green { background: #dcfce7; color: #166534; }

  .hotel-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .btn-add { background: #0F2544; color: #F7F3EF; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; }

  /* Search / filter card */
  .search-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(15,37,68,0.12);
    padding: 24px;
    max-width: 440px;
  }
  .search-card-title { font-size: 13px; font-weight: 700; color: #1E3A5F; margin-bottom: 14px; }
  .filter-group { margin-bottom: 14px; }
  .filter-label { font-size: 11px; font-weight: 700; color: #9FB3C8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .filter-input { width: 100%; background: #fff; border: 1.5px solid #DDD5CC; border-radius: 10px; color: #1E3A5F; font-family: inherit; font-size: 14px; padding: 10px 13px; outline: none; }
  .filter-input:focus { border-color: #0F2544; }
  .pill-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill { background: #fff; color: #1E3A5F; font-size: 12px; font-weight: 600; padding: 7px 15px; border-radius: 24px; border: 1.5px solid #DDD5CC; cursor: pointer; font-family: inherit; }
  .pill.active { border-color: transparent; box-shadow: 0 1px 4px rgba(15,37,68,0.10); }
  .search-btn { width: 100%; background: #0F2544; color: #F7F3EF; font-size: 14px; font-weight: 700; padding: 13px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }

  /* Stat / summary card */
  .stat-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid rgba(15,37,68,0.06);
    box-shadow: 0 2px 12px rgba(15,37,68,0.08);
    padding: 20px 22px;
    min-width: 140px;
  }
  .stat-label { font-size: 11px; font-weight: 700; color: #9FB3C8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #1E3A5F; line-height: 1; margin-bottom: 4px; }
  .stat-sub { font-size: 12px; color: #9FB3C8; font-weight: 500; }

  .cards-row { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>

  <div class="section">
    <div class="section-label">Hotel Result Card</div>
    <div class="hotel-card">
      <div class="hotel-avatar">SB</div>
      <div class="hotel-info">
        <div class="hotel-name">The Sunset Bay Hotel</div>
        <div class="hotel-meta">Malibu, CA · 4.8 ★ · 120 rooms</div>
        <div class="hotel-tags">
          <span class="tag">Boutique</span>
          <span class="tag">Beachfront</span>
          <span class="tag-green tag">Email Found</span>
        </div>
      </div>
      <div class="hotel-actions">
        <button class="btn-add">+ Add</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Search / Filter Card</div>
    <div class="search-card">
      <div class="search-card-title">Find Hotels to Partner With</div>
      <div class="filter-group">
        <div class="filter-label">Location</div>
        <input class="filter-input" placeholder="City, state or region…" />
      </div>
      <div class="filter-group">
        <div class="filter-label">Type</div>
        <div class="pill-row">
          <button class="pill active">All</button>
          <button class="pill">Boutique</button>
          <button class="pill">Resort</button>
          <button class="pill">Eco</button>
        </div>
      </div>
      <button class="search-btn">Search Hotels</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Stat / Summary Cards</div>
    <div class="cards-row">
      <div class="stat-card">
        <div class="stat-label">Hotels Saved</div>
        <div class="stat-value">24</div>
        <div class="stat-sub">across 3 lists</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Emails Sent</div>
        <div class="stat-value">11</div>
        <div class="stat-sub">this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open Rate</div>
        <div class="stat-value">64%</div>
        <div class="stat-sub">last 30 days</div>
      </div>
    </div>
  </div>

</body>
</html>
